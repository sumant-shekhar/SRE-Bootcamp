name: Deploy-SRE-BOOTCAMP
on:
  push:
    branches: 
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file
        run: |
          cat <<EOF > .env
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Create database.ini file
        run: |
          cat <<EOF > database.ini
          ${{ secrets.DATABASE_FILE }}
          EOF 

      - name: Docker Deploy
        run: docker compose up -d --build

