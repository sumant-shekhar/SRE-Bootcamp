version: '3.8'

services:
  web:
    build: .
    ports:
      - "4000:4000"
    environment:
      - POSTGRES_DB=srebootcamp
      - POSTGRES_USER=suman
      - POSTGRES_PASSWORD=admin
    depends_on:
      - db

  db:
    image: postgres:18.4-alpine
    environment:
      - POSTGRES_DB=srebootcamp
      - POSTGRES_USER=suman
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
