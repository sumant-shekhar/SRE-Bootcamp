services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sre-bootcamp-app
    ports:
      - "4000:4000"
      - "5432:5432"
    environment:
      DB_USER: suman
      DB_PASSWORD: admin
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: srebootcamp
      DATABASE_URL: postgresql://suman:admin@db:5432/srebootcamp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: sre-bootcamp-db
    environment:
      POSTGRES_DB: srebootcamp
      POSTGRES_USER: suman
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suman -d srebootcamp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: