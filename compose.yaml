services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sre-bootcamp-app
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: sre-bootcamp-db
    environment:
      POSTGRES_DB: srebootcamp
      POSTGRES_USER: suman
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suman -d srebootcamp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: